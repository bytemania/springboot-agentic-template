apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: task-manager
  labels:
    app: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: task-manager-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/taskdb
            - name: DB_DRIVER
              value: org.postgresql.Driver
            - name: DB_USER
              value: taskuser
            - name: DB_PASS
              value: taskpassword
            - name: JPA_DIALECT
              value: org.hibernate.dialect.PostgreSQLDialect
            - name: SPRING_PROFILES_ACTIVE
              value: docker
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: task-manager
  labels:
    app: app
spec:
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
